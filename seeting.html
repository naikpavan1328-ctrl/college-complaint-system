<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings - Complaint Management System</title>
  <style>
    body, html {
      margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f7f9fc;
      height: 100%;
      color: #34495e;
    }
    header {
      background-color: #34495e; color: #ecf0f1; padding: 1rem 2rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    main {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    h2 {
      margin-bottom: 1.5rem;
      text-align: center;
      color: #e74c3c;
    }
    form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    form input[type="text"],
    form input[type="email"],
    form input[type="password"],
    form select {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    form button {
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 12px 20px;
      width: 100%;
      border-radius: 4px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    form button:hover {
      background-color: #c0392b;
    }
    .success-message {
      background-color: #27ae60;
      color: white;
      padding: 10px;
      text-align: center;
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Settings - Complaint Management</h1>
  </header>

  <main>
    <h2>Update Profile</h2>
    <div id="successMessage" class="success-message">Settings updated successfully!</div>
    <form id="settingsForm">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" required placeholder="Enter full name" />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="Enter email" />

      <label for="notification">Notification Preferences</label>
      <select id="notification" name="notification">
        <option value="all">Receive All Notifications</option>
        <option value="important">Only Important Notifications</option>
        <option value="none">No Notifications</option>
      </select>

      <h2>Change Password</h2>

      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" name="currentPassword" required placeholder="Current password" />

      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" name="newPassword" required placeholder="New password" />

      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" />

      <button type="submit">Save Changes</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('settingsForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const newPassword = form.newPassword.value;
      const confirmPassword = form.confirmPassword.value;

      if (newPassword !== confirmPassword) {
        alert('New password and confirmation do not match!');
        return;
      }

      successMessage.style.display = 'block';

      setTimeout(() => {
        successMessage.style.display = 'none';
        form.currentPassword.value = '';
        form.newPassword.value = '';
        form.confirmPassword.value = '';
      }, 3000);
    });
  </script>
</body>
</html>
